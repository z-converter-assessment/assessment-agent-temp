name: release

# v* 태그가 push되면 2종을 빌드해 그 태그의 GitHub Release에 에셋으로 올린다.
#   git tag v1.2.3 && git push origin v1.2.3
# Linux는 musl fully-static 단일 바이너리(linux-x86_64)로 전 x86_64 리눅스(kernel >= 2.6.32)를,
# Windows는 단일 i686 바이너리(windows-x86)로 NT5.2(2003/XP)부터 NT10(2016+/Win10-11)까지
# 하나로 커버한다. 둘 다 required — 없으면 릴리즈 실패.
on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# 최소 권한 기본값(read). 릴리즈 게시(contents:write)가 필요한 잡에만 국소 상향.
permissions:
  contents: read

jobs:
  # Linux — musl fully-static 단일 바이너리(linux-x86_64). glibc 버전 독립이라
  # 전 x86_64 리눅스(kernel >= 2.6.32)를 하나로 커버한다. checkout은 host에서,
  # 빌드만 Alpine 컨테이너 안에서(scripts/build-linux.sh가 docker run).
  build-linux:
    name: Linux (musl-static)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: build (musl fully-static)
        # payload agent_version = 릴리즈 태그(v1.0.0 -> 1.0.0). 별도 스키마 버전 안 매김.
        run: AGENT_VERSION="${GITHUB_REF_NAME#v}" sh scripts/build-linux.sh
      - name: wire 계약 conformance (native)
        # musl static 은 러너에서 바로 돈다. emit dry-run 출력을 wire 스키마로 강제 —
        # Linux 트리가 계약을 어기면 릴리즈 전에 실패시킨다. 비root 라 일부 pid/exe 는
        # null 이지만 검증 대상은 구조(필드/타입/null)라 무관하다.
        run: |
          python3 -m pip install --quiet 'jsonschema>=4.18'
          bash scripts/check-contract.sh dist/assessment-agent-linux-x86_64
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: linux
          path: |
            dist/assessment-agent-linux-x86_64
            dist/THIRD-PARTY-NOTICES-linux-x86_64.txt
          if-no-files-found: error

  # Windows — 단일 i686 바이너리(assessment-agent-windows-x86.exe). NT5.2(2003/XP)부터
  # NT10(2016+/Win10-11)까지 하나로 커버한다. 세대 분기는 컴파일 타임이 아니라 런타임
  # (collect.c agent_is_nt6 + GetProcAddress). debian:bookworm(gcc 12.2, CRT runtime 10.x)로만
  # 빌드 — CRT v10이 NT5.2 startup을 유지한다. CRT 12+(ubuntu 최신)로는 verify는 통과해도
  # 실기 startup이 드롭된다. verify가 NT6+ 심볼 하드임포트를 차단해 2003 로드 실패를 빌드
  # 단계에서 막는다. checkout은 runner에서, 빌드만 컨테이너 안에서(docker run).
  build-windows:
    name: Windows (windows-x86 / single i686)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: build in debian:bookworm (CRT v10)
        run: |
          docker run --rm --network host -e AGENT_VERSION="${GITHUB_REF_NAME#v}" -v "$PWD/windows-agent":/w -w /w debian:bookworm bash -c '
            set -e
            apt-get update -qq
            DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
              gcc-mingw-w64-i686 binutils-mingw-w64-i686 cmake make git perl ca-certificates
            echo "[toolchain] $(i686-w64-mingw32-gcc --version | head -1)"
            make JOBS=2 vendor-build
            make AGENT_VERSION="$AGENT_VERSION" release
          '
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: win
          path: |
            windows-agent/dist/*.exe
            windows-agent/dist/THIRD-PARTY-NOTICES-windows-x86.txt
          if-no-files-found: error

  # Windows wire 계약 conformance — 실제 Windows 러너(windows-latest)에서 exe 를 WoW64 로
  # 직접 실행한다. NT5.2 타깃 i686 이라 하위호환으로 최신 Windows 에서 구동된다. emit dry-run
  # 출력을 리눅스와 동일한 wire 스키마로 강제해, 윈도우 트리가 계약을 어기면 릴리즈를 막는다.
  # (wine 대신 실기 러너 — 에뮬레이션 불확실성 없음.)
  contract-windows:
    name: Windows contract conformance
    needs: build-windows
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: win
          path: dist
      - name: wire 계약 conformance (native WoW64)
        shell: bash
        run: |
          python -m pip install --quiet 'jsonschema>=4.18'
          bash scripts/check-contract.sh dist/assessment-agent-windows-x86.exe

  # 성공한 산출물을 모아 통합 SHA256SUMS 생성 후 태그 릴리즈에 upsert 게시.
  # 2종(linux-x86_64, windows-x86) 모두 required — 없으면 릴리즈 실패.
  # 양 트리 contract conformance(build-linux 인라인 + contract-windows) 통과가 릴리즈 전제.
  release:
    needs: [build-linux, build-windows, contract-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          merge-multiple: true
      - name: verify required + checksums
        working-directory: dist
        run: |
          # required 2종 — 없으면 릴리즈 실패 (loud fail)
          test -f assessment-agent-linux-x86_64 || { echo "MISSING required: linux-x86_64"; exit 1; }
          test -f assessment-agent-windows-x86.exe || { echo "MISSING required: windows-x86"; exit 1; }
          sha256sum assessment-agent-* > SHA256SUMS
          ls -la
          cat SHA256SUMS
      - name: publish release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          # 고정 body로 upsert마다 덮어쓴다. generate_release_notes(true)는 동일 태그
          # 재릴리즈 시 기존 body에 changelog 줄을 누적시켜 중복되므로 쓰지 않는다.
          body: "Full Changelog: https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}"
          fail_on_unmatched_files: false
          files: |
            dist/assessment-agent-linux-x86_64
            dist/assessment-agent-windows-x86.exe
            dist/THIRD-PARTY-NOTICES-linux-x86_64.txt
            dist/THIRD-PARTY-NOTICES-windows-x86.txt
            dist/SHA256SUMS
