name: release

# v* 태그가 push되면 2종을 빌드해 그 태그의 GitHub Release에 에셋으로 올린다.
#   git tag v1.2.3 && git push origin v1.2.3
# Linux는 musl fully-static 단일 바이너리(linux-x86_64)로 전 x86_64 리눅스(kernel >= 2.6.32)를,
# Windows는 단일 i686 바이너리(windows-x86)로 NT5.2(2003/XP)부터 NT10(2016+/Win10-11)까지
# 하나로 커버한다. 둘 다 required — 없으면 릴리즈 실패.
on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # Linux — musl fully-static 단일 바이너리(linux-x86_64). glibc 버전 독립이라
  # 전 x86_64 리눅스(kernel >= 2.6.32)를 하나로 커버한다. checkout은 host에서,
  # 빌드만 Alpine 컨테이너 안에서(scripts/build-linux.sh가 docker run).
  build-linux:
    name: Linux (musl-static)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: build (musl fully-static)
        # payload agent_version = 릴리즈 태그(v1.0.0 -> 1.0.0). 별도 스키마 버전 안 매김.
        run: AGENT_VERSION="${GITHUB_REF_NAME#v}" sh scripts/build-linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/assessment-agent-linux-x86_64
          if-no-files-found: error

  # Windows — 단일 i686 바이너리(assessment-agent-windows-x86.exe). NT5.2(2003/XP)부터
  # NT10(2016+/Win10-11)까지 하나로 커버한다. 세대 분기는 컴파일 타임이 아니라 런타임
  # (collect.c agent_is_nt6 + GetProcAddress). debian:bookworm(gcc 12.2, CRT runtime 10.x)로만
  # 빌드 — CRT v10이 NT5.2 startup을 유지한다. CRT 12+(ubuntu 최신)로는 verify는 통과해도
  # 실기 startup이 드롭된다. verify가 NT6+ 심볼 하드임포트를 차단해 2003 로드 실패를 빌드
  # 단계에서 막는다. checkout은 runner(node20)에서, 빌드만 컨테이너 안에서(docker run).
  build-windows:
    name: Windows (windows-x86 / single i686)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: build in debian:bookworm (CRT v10)
        run: |
          docker run --rm --network host -e AGENT_VERSION="${GITHUB_REF_NAME#v}" -v "$PWD/windows-agent":/w -w /w debian:bookworm bash -c '
            set -e
            apt-get update -qq
            DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
              gcc-mingw-w64-i686 binutils-mingw-w64-i686 cmake make git perl ca-certificates
            echo "[toolchain] $(i686-w64-mingw32-gcc --version | head -1)"
            make JOBS=2 vendor-build
            make AGENT_VERSION="$AGENT_VERSION" release
          '
      - uses: actions/upload-artifact@v4
        with:
          name: win
          path: windows-agent/dist/*.exe
          if-no-files-found: error

  # 성공한 산출물을 모아 통합 SHA256SUMS 생성 후 태그 릴리즈에 upsert 게시.
  # 2종(linux-x86_64, windows-x86) 모두 required — 없으면 릴리즈 실패.
  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: verify required + checksums
        working-directory: dist
        run: |
          # required 2종 — 없으면 릴리즈 실패 (loud fail)
          test -f assessment-agent-linux-x86_64 || { echo "MISSING required: linux-x86_64"; exit 1; }
          test -f assessment-agent-windows-x86.exe || { echo "MISSING required: windows-x86"; exit 1; }
          sha256sum assessment-agent-* > SHA256SUMS
          ls -la
          cat SHA256SUMS
      - name: publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          # 고정 body로 upsert마다 덮어쓴다. generate_release_notes(true)는 동일 태그
          # 재릴리즈 시 기존 body에 changelog 줄을 누적시켜 중복되므로 쓰지 않는다.
          body: "Full Changelog: https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}"
          fail_on_unmatched_files: false
          files: |
            dist/assessment-agent-linux-x86_64
            dist/assessment-agent-windows-x86.exe
            dist/SHA256SUMS
