name: release

# v* 태그가 push되면 5종을 빌드해 그 태그의 GitHub Release에 에셋으로 올린다.
#   git tag v1.2.3 && git push origin v1.2.3
# required(항상 있어야 함): linux-x86_64, win2016-x64
# best-effort(빌드 깨져도 릴리즈 진행): linux-x86_64-glibc2.12, win2008r2-x64, win2003-x86
on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # Linux 2종 — glibc ABI 하한을 manylinux 컨테이너 glibc로 고정.
  # checkout은 host(node20)에서, 빌드만 컨테이너 안에서 (scripts/build-linux.sh가 docker run).
  # legacy(manylinux2010)는 upstream EOL/archived라 pull이 막힐 수 있어 best-effort.
  build-linux:
    name: Linux (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: modern
            image: quay.io/pypa/manylinux2014_x86_64
            target: release
          - name: legacy
            image: quay.io/pypa/manylinux2010_x86_64
            target: release-legacy
            experimental: true
    steps:
      - uses: actions/checkout@v4
      - name: build (${{ matrix.name }})
        # payload agent_version = 릴리즈 태그(v1.0.0 -> 1.0.0). 별도 스키마 버전 안 매김.
        run: AGENT_VERSION="${GITHUB_REF_NAME#v}" BUILD_IMAGE=${{ matrix.image }} BUILD_TARGET=${{ matrix.target }} sh scripts/build-linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.name }}
          path: dist/assessment-agent-linux-*
          if-no-files-found: error

  # Windows modern/win7 (x64 2종) — ubuntu에서 MinGW-w64 x86_64 크로스컴파일.
  # legacy32(win2003-x86)는 CRT 버전 제약으로 별도 job(build-windows-legacy32)에서 빌드.
  build-windows:
    name: Windows (${{ matrix.profile }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: modern
            cross: "CC=x86_64-w64-mingw32-gcc AR=x86_64-w64-mingw32-ar WINDRES=x86_64-w64-mingw32-windres OPENSSL_TARGET=mingw64 OPENSSL_CROSS=--cross-compile-prefix=x86_64-w64-mingw32-"
          - profile: win7
            cross: "CC=x86_64-w64-mingw32-gcc AR=x86_64-w64-mingw32-ar WINDRES=x86_64-w64-mingw32-windres OPENSSL_TARGET=mingw64 OPENSSL_CROSS=--cross-compile-prefix=x86_64-w64-mingw32-"
            experimental: true
    steps:
      - uses: actions/checkout@v4
      - name: install mingw-w64 toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-mingw-w64-x86-64 binutils-mingw-w64-x86-64 \
            cmake make git perl
      - name: build (${{ matrix.profile }})
        working-directory: windows-agent
        run: |
          make PROFILE=${{ matrix.profile }} ${{ matrix.cross }} vendor-build
          make PROFILE=${{ matrix.profile }} ${{ matrix.cross }} AGENT_VERSION="${GITHUB_REF_NAME#v}" release
      - uses: actions/upload-artifact@v4
        with:
          name: win-${{ matrix.profile }}
          path: windows-agent/dist/*.exe
          if-no-files-found: error

  # legacy32(win2003-x86) — debian:bookworm 컨테이너에서 빌드.
  # bookworm의 mingw-w64(gcc 12.2, CRT runtime 10.x)가 NT5.2(XP/2003) startup을 유지한다.
  # CRT 12+(ubuntu 최신)로는 verify는 통과해도 실기 startup이 드롭되므로 반드시 bookworm.
  # checkout은 runner(node20)에서, 빌드만 컨테이너 안에서(docker run).
  build-windows-legacy32:
    name: Windows (legacy32 / win2003-x86)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: build in debian:bookworm (CRT v10)
        run: |
          docker run --rm --network host -e AGENT_VERSION="${GITHUB_REF_NAME#v}" -v "$PWD/windows-agent":/w -w /w debian:bookworm bash -c '
            set -e
            apt-get update -qq
            DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
              gcc-mingw-w64-i686 binutils-mingw-w64-i686 cmake make git perl ca-certificates
            echo "[toolchain] $(i686-w64-mingw32-gcc --version | head -1)"
            make PROFILE=legacy32 JOBS=2 vendor-build
            make PROFILE=legacy32 AGENT_VERSION="$AGENT_VERSION" release
          '
      - uses: actions/upload-artifact@v4
        with:
          name: win-legacy32
          path: windows-agent/dist/*.exe
          if-no-files-found: error

  # 성공한 산출물을 모아 통합 SHA256SUMS 생성 후 태그 릴리즈에 upsert 게시.
  # required 2종(linux-x86_64, win2016-x64)은 없으면 릴리즈 실패, 나머지는 있으면 붙이고 없으면 skip.
  release:
    needs: [build-linux, build-windows, build-windows-legacy32]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: verify required + checksums
        working-directory: dist
        run: |
          # required — 없으면 릴리즈 실패 (loud fail)
          test -f assessment-agent-linux-x86_64 || { echo "MISSING required: linux-x86_64"; exit 1; }
          test -f assessment-agent-win2016-x64.exe || { echo "MISSING required: win2016-x64"; exit 1; }
          # best-effort 결측은 경고만
          for f in assessment-agent-linux-x86_64-glibc2.12 assessment-agent-win2008r2-x64.exe assessment-agent-win2003-x86.exe; do
            test -f "$f" || echo "[release] best-effort 결측 — skip: $f"
          done
          sha256sum assessment-agent-* > SHA256SUMS
          ls -la
          cat SHA256SUMS
      - name: publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          # 고정 body로 upsert마다 덮어쓴다. generate_release_notes(true)는 동일 태그
          # 재릴리즈 시 기존 body에 changelog 줄을 누적시켜 중복되므로 쓰지 않는다.
          body: "Full Changelog: https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}"
          fail_on_unmatched_files: false
          files: |
            dist/assessment-agent-linux-x86_64
            dist/assessment-agent-linux-x86_64-glibc2.12
            dist/assessment-agent-win2016-x64.exe
            dist/assessment-agent-win2008r2-x64.exe
            dist/assessment-agent-win2003-x86.exe
            dist/SHA256SUMS
