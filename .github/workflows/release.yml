name: release

# v* 태그가 push되면 5종을 빌드해 그 태그의 GitHub Release에 에셋으로 올린다.
#   git tag v1.2.3 && git push origin v1.2.3
on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # Linux 2종 — glibc ABI 하한을 manylinux 컨테이너 glibc로 고정.
  # checkout은 host(node20)에서, 빌드만 컨테이너 안에서 (scripts/build-linux.sh가 docker run).
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: modern
            image: quay.io/pypa/manylinux2014_x86_64
            target: release
          - name: legacy
            image: quay.io/pypa/manylinux2010_x86_64
            target: release-legacy
    steps:
      - uses: actions/checkout@v4
      - name: build (${{ matrix.name }})
        run: BUILD_IMAGE=${{ matrix.image }} BUILD_TARGET=${{ matrix.target }} sh scripts/build-linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.name }}
          path: dist/assessment-agent-linux-*
          if-no-files-found: error

  # Windows 3종 — ubuntu에서 MinGW-w64 크로스컴파일.
  # modern/win7는 x86_64 툴체인을 넘기고, legacy32(i686/NT5.2)는 Makefile 내부 값을 쓴다.
  # 주의: legacy32는 NT 5.2 startup을 여전히 내는 구형 i686 MinGW가 필요 —
  #       ubuntu-latest의 최신 i686 툴체인은 XP/2003 로드가 안 될 수 있다(실행 검증은 별도).
  build-windows:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: modern
            cross: "CC=x86_64-w64-mingw32-gcc AR=x86_64-w64-mingw32-ar WINDRES=x86_64-w64-mingw32-windres OPENSSL_TARGET=mingw64 OPENSSL_CROSS=--cross-compile-prefix=x86_64-w64-mingw32-"
          - profile: win7
            cross: "CC=x86_64-w64-mingw32-gcc AR=x86_64-w64-mingw32-ar WINDRES=x86_64-w64-mingw32-windres OPENSSL_TARGET=mingw64 OPENSSL_CROSS=--cross-compile-prefix=x86_64-w64-mingw32-"
          - profile: legacy32
            cross: ""
    steps:
      - uses: actions/checkout@v4
      - name: install mingw-w64 toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-mingw-w64-x86-64 gcc-mingw-w64-i686 \
            binutils-mingw-w64-x86-64 binutils-mingw-w64-i686 \
            cmake make git perl
      - name: build (${{ matrix.profile }})
        working-directory: windows-agent
        run: |
          make PROFILE=${{ matrix.profile }} ${{ matrix.cross }} vendor-build
          make PROFILE=${{ matrix.profile }} ${{ matrix.cross }} release
      - uses: actions/upload-artifact@v4
        with:
          name: win-${{ matrix.profile }}
          path: windows-agent/dist/*.exe
          if-no-files-found: error

  # 5종을 모아 통합 SHA256SUMS 생성 후 태그 릴리즈에 게시.
  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: checksums + publish
        working-directory: dist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha256sum assessment-agent-* > SHA256SUMS
          ls -la
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            assessment-agent-linux-x86_64 \
            assessment-agent-linux-x86_64-glibc2.12 \
            assessment-agent-win2016-x64.exe \
            assessment-agent-win2008r2-x64.exe \
            assessment-agent-win2003-x86.exe \
            SHA256SUMS
